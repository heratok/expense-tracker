version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: pet-mongo-backend
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: expense_tracker
    volumes:
      - mongo_backend_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pet-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/expense_tracker
      - JWT_SECRET=change_me_in_production
      - CLIENT_ORIGIN=http://localhost:5173
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=development
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongo_backend_data:
